services:
  nextcloud:
    image: nextcloud:33-apache
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost docker.office.vanbe.be 192.168.1.15"
      SQLITE_DATABASE: nextcloud
    volumes:
      - nc_data:/var/www/html
      - ./:/var/www/html/custom_apps/lists
      # Dev-only: disable OPcache 60s revalidation window so PHP edits are picked up immediately
      # (zz- prefix loads after the image's opcache-recommended.ini).
      - ./dev/opcache.ini:/usr/local/etc/php/conf.d/zz-dev-opcache.ini:ro
    restart: unless-stopped

volumes:
  nc_data:
